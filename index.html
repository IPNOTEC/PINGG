<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IPNOTEC PINGG · 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* =====================================================
   ROOT VARIABLES — DARK GLASS THEME
===================================================== */
:root {
  /* VIBGYOR + extended */
  --clr-v:#9d00ff; --clr-i:#5500cc; --clr-b:#00a2ff; --clr-g:#00e676;
  --clr-y:#ffe600; --clr-o:#ff6200; --clr-r:#ff1744;
  --clr-c:#00ffea; --clr-p:#ff00cc; --clr-w:#ffffff;
  /* Glass palette */
  --bg-deep:#040410;
  --device-bg:rgba(8,8,22,0.88);
  --panel-bg:rgba(255,255,255,0.025);
  --panel-bg2:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --grey:#6e6e82; --grey2:#9a9ab0;
  /* Fonts */
  --f-display:'Orbitron',sans-serif;
  --f-mono:'Share Tech Mono',monospace;
  --f-body:'Exo 2',sans-serif;
  /* Active user color (changes per user pick) */
  --user-clr:#00a2ff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
body{font-family:var(--f-body);background:var(--bg-deep);min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;position:relative;}

/* SCANLINES */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:9998;}

/* AMBIENT ORBS */
.orbs{position:fixed;inset:0;z-index:0;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:orbf 22s ease-in-out infinite alternate;}
.orb:nth-child(1){width:500px;height:500px;background:rgba(157,0,255,0.07);top:-15%;left:-15%;}
.orb:nth-child(2){width:400px;height:400px;background:rgba(0,162,255,0.06);bottom:-10%;right:-10%;animation-delay:-8s;}
.orb:nth-child(3){width:300px;height:300px;background:rgba(0,230,118,0.05);top:35%;left:45%;animation-delay:-15s;}
.orb:nth-child(4){width:250px;height:250px;background:rgba(255,0,204,0.04);top:60%;left:5%;animation-delay:-5s;}
@keyframes orbf{0%{transform:translate(0,0) scale(1);}100%{transform:translate(25px,18px) scale(1.12);}}

/* =====================================================
   DEVICE FRAME — BLACK GLASS PHONE
===================================================== */
.device{
  width:min(424px,100vw);height:min(870px,100vh);
  background:var(--device-bg);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  border-radius:34px;
  border:1px solid var(--border2);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.03),
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 -1px 0 rgba(255,255,255,0.03),
    0 40px 100px rgba(0,0,0,0.95),
    0 0 80px rgba(0,0,30,0.5);
  position:relative;z-index:1;
  display:flex;flex-direction:column;overflow:hidden;
}
/* Side notch buttons */
.device::before{content:'';position:absolute;right:-3px;top:120px;width:3px;height:50px;background:rgba(255,255,255,0.06);border-radius:0 3px 3px 0;}
.device::after{content:'';position:absolute;right:-3px;top:185px;width:3px;height:35px;background:rgba(255,255,255,0.06);border-radius:0 3px 3px 0;}

/* EDGE INDICATOR — left side color flash */
.edge-ind{
  position:absolute;left:0;top:70px;width:4px;height:80px;
  border-radius:0 4px 4px 0;opacity:0;
  transition:opacity 0.4s ease,background-color 0.2s;
  z-index:50;
  box-shadow:0 0 16px currentColor;
}

/* =====================================================
   STATUS BAR
===================================================== */
.sb{
  height:46px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:rgba(0,0,0,0.35);
  border-bottom:1px solid var(--border);
  position:relative;z-index:30;
  backdrop-filter:blur(20px);
}
.sb-left{display:flex;align-items:center;gap:10px;}
.sb-logo{font-family:var(--f-display);font-size:11px;font-weight:800;letter-spacing:3px;color:rgba(255,255,255,0.92);text-shadow:0 0 12px rgba(255,255,255,0.2);}
/* 3-dot indicator */
.sb-dots{display:flex;gap:6px;align-items:center;}
.sdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.25);box-shadow:0 0 4px rgba(255,255,255,0.15);}
.sdot:nth-child(1){animation:sdp 2s infinite;}
.sdot:nth-child(2){animation:sdp 2s 0.3s infinite;}
.sdot:nth-child(3){animation:sdp 2s 0.6s infinite;}
@keyframes sdp{0%,100%{opacity:0.25;}50%{opacity:1;box-shadow:0 0 8px rgba(255,255,255,0.5);}}
.sb-mode-badge{font-family:var(--f-mono);font-size:8px;padding:2px 7px;border-radius:10px;border:1px solid;letter-spacing:1px;}
.sb-mode-badge.boot{background:rgba(0,162,255,0.1);color:var(--clr-b);border-color:rgba(0,162,255,0.3);}
.sb-mode-badge.active{background:rgba(0,230,118,0.1);color:var(--clr-g);border-color:rgba(0,230,118,0.3);}
.sb-mode-badge.exit{background:rgba(255,23,68,0.1);color:var(--clr-r);border-color:rgba(255,23,68,0.3);}
.sb-right{display:flex;align-items:center;gap:10px;}
.sb-time{font-family:var(--f-mono);font-size:12px;color:rgba(255,255,255,0.85);}
.sb-bat{display:flex;align-items:center;gap:2px;opacity:0.7;}
.bat{width:20px;height:10px;border:1.5px solid rgba(255,255,255,0.4);border-radius:2.5px;padding:1.5px;position:relative;}
.bat::after{content:'';position:absolute;right:-4px;top:50%;transform:translateY(-50%);width:3px;height:6px;background:rgba(255,255,255,0.35);border-radius:0 1px 1px 0;}
.bat-fill{height:100%;width:68%;background:var(--clr-g);border-radius:1px;}
.sb-vol{cursor:pointer;font-size:10px;color:rgba(255,255,255,0.4);transition:color 0.2s;}
.sb-vol:hover{color:rgba(255,255,255,0.8);}

/* =====================================================
   NOTIFICATION BANNER (fake app notifs, top overlay)
===================================================== */
.notif-wrap{position:absolute;top:-90px;left:10px;right:10px;z-index:200;transition:top 0.45s cubic-bezier(0.34,1.5,0.64,1);}
.notif-wrap.show{top:54px;}
.notif{
  background:rgba(14,14,30,0.97);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;padding:10px 14px;
  display:flex;align-items:center;gap:10px;
  backdrop-filter:blur(30px);
  box-shadow:0 12px 40px rgba(0,0,0,0.6);
}
.notif-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;font-style:normal;}
.notif-body{flex:1;min-width:0;}
.notif-app{font-family:var(--f-mono);font-size:8px;color:rgba(255,255,255,0.45);letter-spacing:1.5px;text-transform:uppercase;}
.notif-txt{font-size:12px;color:rgba(255,255,255,0.88);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.notif-time{font-family:var(--f-mono);font-size:8px;color:rgba(255,255,255,0.3);flex-shrink:0;}
.notif-x{width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.3);font-size:11px;border-radius:50%;transition:background 0.2s;}
.notif-x:hover{background:rgba(255,255,255,0.08);}

/* =====================================================
   SCREENS — absolute overlay below status bar
===================================================== */
.screen{
  position:absolute;top:46px;left:0;right:0;bottom:0;
  opacity:0;pointer-events:none;
  transition:opacity 0.5s ease, transform 0.5s ease;
  transform:translateY(12px);
  display:flex;flex-direction:column;
}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0);}

/* =====================================================
   SCREEN: BOOT
===================================================== */
#s-boot{background:rgba(4,4,16,0.7);}
.boot-top{padding:20px 20px 12px;border-bottom:1px solid var(--border);}
.boot-logo{font-family:var(--f-display);font-size:18px;font-weight:900;letter-spacing:4px;color:#fff;text-align:center;text-shadow:0 0 20px rgba(255,255,255,0.15);}
.boot-logo em{color:var(--user-clr);font-style:normal;}
.boot-tag{font-family:var(--f-mono);font-size:9px;color:var(--grey2);text-align:center;margin-top:4px;letter-spacing:2px;}
.boot-prog{height:2px;background:rgba(255,255,255,0.06);margin-top:14px;overflow:hidden;}
.boot-prog-fill{height:100%;background:linear-gradient(90deg,var(--user-clr),var(--clr-g));transition:width 0.7s ease;width:0%;}
.boot-steps{flex:1;overflow-y:auto;padding:10px 16px;display:flex;flex-direction:column;gap:7px;}
.boot-steps::-webkit-scrollbar{width:2px;}
.boot-steps::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);}
.bs{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:11px;border:1px solid transparent;background:rgba(255,255,255,0.015);transition:all 0.4s ease;}
.bs.pend{opacity:0.28;}
.bs.act{border-color:rgba(0,162,255,0.3);background:rgba(0,162,255,0.05);animation:bspulse 2s infinite;}
.bs.done{border-color:rgba(0,230,118,0.2);background:rgba(0,230,118,0.03);}
@keyframes bspulse{0%,100%{box-shadow:none;}50%{box-shadow:0 0 0 3px rgba(0,162,255,0.08);}}
.bs-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:rgba(255,255,255,0.04);border:1px solid var(--border);}
.bs.act .bs-ic{background:rgba(0,162,255,0.1);border-color:rgba(0,162,255,0.3);}
.bs.done .bs-ic{background:rgba(0,230,118,0.1);border-color:rgba(0,230,118,0.3);}
.bs-info{flex:1;}
.bs-lbl{font-family:var(--f-mono);font-size:10px;font-weight:600;letter-spacing:1px;color:rgba(255,255,255,0.5);}
.bs.act .bs-lbl{color:var(--clr-b);}
.bs.done .bs-lbl{color:var(--clr-g);}
.bs-sub{font-family:var(--f-mono);font-size:9px;color:rgba(255,255,255,0.22);margin-top:2px;}
.bs.act .bs-sub{color:rgba(0,162,255,0.55);}
.bs-st{width:18px;text-align:center;flex-shrink:0;}
.chk{color:var(--clr-g);font-size:13px;animation:chkpop 0.3s ease;}
@keyframes chkpop{from{transform:scale(0) rotate(-20deg);}to{transform:scale(1) rotate(0);}}
.spin{width:14px;height:14px;border:2px solid rgba(0,162,255,0.15);border-top-color:var(--clr-b);border-radius:50%;animation:sp 0.7s linear infinite;display:inline-block;}
@keyframes sp{to{transform:rotate(360deg);}}
.boot-foot{padding:12px 16px 16px;border-top:1px solid var(--border);flex-shrink:0;}
.boot-btn{width:100%;padding:13px;background:var(--user-clr);color:#000;font-family:var(--f-display);font-size:12px;font-weight:700;letter-spacing:2px;border:none;border-radius:11px;cursor:pointer;transition:all 0.3s;box-shadow:0 0 20px rgba(0,162,255,0.25);}
.boot-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 0 30px rgba(0,162,255,0.4);}
.boot-btn:disabled{opacity:0.3;pointer-events:none;}

/* PIN OVERLAY */
.pin-ov{position:absolute;inset:0;background:rgba(4,4,16,0.97);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;backdrop-filter:blur(20px);}
.pin-ov.show{display:flex;}
.pin-title{font-family:var(--f-display);font-size:13px;letter-spacing:3px;color:#fff;text-align:center;}
.pin-sub{font-family:var(--f-mono);font-size:9px;color:var(--grey);letter-spacing:2px;}
.pin-dots{display:flex;gap:14px;}
.pd{width:15px;height:15px;border-radius:50%;border:2px solid rgba(0,162,255,0.3);transition:all 0.2s;}
.pd.on{background:var(--clr-b);border-color:var(--clr-b);box-shadow:0 0 10px var(--clr-b);}
.pin-kp{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:200px;}
.pk{padding:13px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:11px;cursor:pointer;font-family:var(--f-display);font-size:17px;font-weight:600;color:#fff;text-align:center;transition:all 0.15s;backdrop-filter:blur(10px);}
.pk:active{background:rgba(0,162,255,0.12);border-color:var(--clr-b);transform:scale(0.93);}

/* =====================================================
   SCREEN: IDENTITY
===================================================== */
#s-id{background:rgba(4,4,16,0.7);padding:20px 18px;gap:16px;justify-content:center;}
.id-logo{font-family:var(--f-display);font-size:20px;font-weight:900;letter-spacing:3px;text-align:center;color:#fff;}
.id-logo em{color:var(--user-clr);font-style:normal;}
.id-sub{font-family:var(--f-mono);font-size:9px;color:var(--grey);text-align:center;letter-spacing:2px;}
.id-card{background:var(--panel-bg);border:1px solid var(--border);border-radius:16px;padding:16px;backdrop-filter:blur(20px);}
.id-lbl{font-family:var(--f-mono);font-size:8px;letter-spacing:2px;color:rgba(255,255,255,0.35);margin-bottom:12px;text-transform:uppercase;}
/* 10-color grid */
.clr-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.clr-pick{width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.3s;position:relative;box-shadow:0 2px 8px rgba(0,0,0,0.4);}
.clr-pick:hover{transform:scale(1.15);}
.clr-pick.sel{border-color:#fff;box-shadow:0 0 0 3px rgba(255,255,255,0.2),0 0 20px currentColor;}
.clr-pick.sel::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700;}
/* White pick needs dark check */
.clr-pick[data-id="w"].sel::after{color:#000;}
.id-name-in{
  width:100%;background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.1);color:#fff;
  padding:12px 14px;border-radius:10px;
  font-family:var(--f-mono);font-size:14px;letter-spacing:2px;text-transform:uppercase;
  outline:none;transition:border 0.3s;
  caret-color:var(--user-clr);
}
.id-name-in::placeholder{color:rgba(255,255,255,0.18);}
.id-name-in:focus{border-color:var(--user-clr);box-shadow:0 0 10px rgba(0,162,255,0.1);}
.id-btn{
  width:100%;padding:14px;background:var(--user-clr);color:#000;
  font-family:var(--f-display);font-size:12px;font-weight:700;letter-spacing:2px;
  border:none;border-radius:12px;cursor:pointer;transition:all 0.3s;
  box-shadow:0 0 20px rgba(0,162,255,0.2);
}
.id-btn:hover{transform:translateY(-2px);box-shadow:0 4px 30px rgba(0,162,255,0.4);}

/* =====================================================
   SCREEN: COMMAND CENTER
===================================================== */
#s-main{background:transparent;}

/* CMD HEADER */
.cmd-hdr{
  flex-shrink:0;height:42px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  background:rgba(0,0,0,0.3);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);
}
.cmd-user{display:flex;align-items:center;gap:7px;}
.cmd-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;transition:box-shadow 0.3s;}
.cmd-name{font-family:var(--f-mono);font-size:11px;font-weight:600;letter-spacing:1px;transition:all 0.4s;white-space:nowrap;overflow:hidden;}
.cmd-name.gone{max-width:0;opacity:0;margin:0;padding:0;}
.anon-label{font-family:var(--f-mono);font-size:9px;color:var(--grey);padding:2px 7px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:8px;display:none;align-items:center;gap:4px;}
.anon-label.show{display:flex;}
.cmd-right{display:flex;align-items:center;gap:8px;}
/* Anon toggle */
.tog-wrap{display:flex;align-items:center;gap:5px;cursor:pointer;}
.tog-lbl{font-family:var(--f-mono);font-size:8px;color:var(--grey);letter-spacing:1px;}
.tog{width:30px;height:16px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:8px;position:relative;transition:all 0.3s;}
.tog::after{content:'';position:absolute;width:11px;height:11px;background:var(--grey);border-radius:50%;top:1.5px;left:1.5px;transition:all 0.3s;}
.tog.on{background:rgba(110,110,130,0.25);border-color:var(--grey2);}
.tog.on::after{left:15px;background:#fff;}

/* BOT STATUS BAR */
.bot-bar{
  flex-shrink:0;height:32px;
  display:flex;align-items:center;gap:6px;
  padding:0 12px;overflow-x:auto;
  background:rgba(0,0,0,0.2);
  border-bottom:1px solid var(--border);
}
.bot-bar::-webkit-scrollbar{display:none;}
.btag{display:flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-family:var(--f-mono);font-size:8px;letter-spacing:0.8px;border:1px solid;flex-shrink:0;cursor:default;transition:transform 0.2s;}
.btag:hover{transform:scale(1.05);}
.bdot{width:5px;height:5px;border-radius:50%;animation:bdp 2.5s ease-in-out infinite;}
@keyframes bdp{0%,100%{opacity:0.4;}50%{opacity:1;}}

/* CHAT */
.chat{flex:1;overflow-y:auto;padding:12px 12px;display:flex;flex-direction:column;gap:5px;}
.chat::-webkit-scrollbar{width:2px;}
.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.07);border-radius:1px;}

/* MESSAGE BUBBLES */
.msg{max-width:84%;display:flex;flex-direction:column;gap:3px;animation:msgin 0.3s ease;}
@keyframes msgin{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg.u{align-self:flex-end;}
.msg.b{align-self:flex-start;}
.msg-hdr{display:flex;align-items:center;gap:5px;padding:0 3px;}
.msg.u .msg-hdr{justify-content:flex-end;}
.m-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.m-name{font-family:var(--f-mono);font-size:9px;font-weight:600;letter-spacing:1px;}
.m-role{font-family:var(--f-mono);font-size:7px;color:rgba(255,255,255,0.2);}
.m-time{font-family:var(--f-mono);font-size:7px;color:rgba(255,255,255,0.2);}
.bubble{padding:9px 13px;border-radius:15px;font-size:12.5px;line-height:1.55;word-break:break-word;}
/* USER bubbles — normal mode */
.msg.u .bubble.mode-normal{border-radius:15px 15px 3px 15px;}
/* BOT bubbles — normal mode */
.msg.b .bubble.mode-normal{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:15px 15px 15px 3px;
  color:rgba(255,255,255,0.88);
}
/* IPNOTEC MODE bubbles — dark glass, text = profile color */
.bubble.mode-ipm{
  background:rgba(8,8,22,0.85);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:15px;
}
.msg.u .bubble.mode-ipm{border-radius:15px 15px 3px 15px;}
.msg.b .bubble.mode-ipm{border-radius:15px 15px 15px 3px;}

/* THINKING dots */
.thinking{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:15px 15px 15px 3px;padding:10px 14px;display:flex;gap:5px;align-items:center;}
.td{width:5px;height:5px;border-radius:50%;animation:tdot 0.9s ease-in-out infinite;}
.td:nth-child(2){animation-delay:0.15s;}
.td:nth-child(3){animation-delay:0.3s;}
@keyframes tdot{0%,100%{transform:translateY(0);opacity:0.35;}50%{transform:translateY(-4px);opacity:1;}}

.sys-msg{text-align:center;font-family:var(--f-mono);font-size:8px;color:rgba(255,255,255,0.18);padding:3px 0;letter-spacing:1.5px;}

/* =====================================================
   MSG INPUT ROW — native textarea
===================================================== */
.msg-row{
  flex-shrink:0;
  display:flex;align-items:flex-end;gap:8px;
  padding:8px 12px 12px;
  background:rgba(0,0,0,0.25);
  border-top:1px solid var(--border);
}
.msg-input{
  flex:1;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:12px;
  padding:10px 14px;
  font-family:var(--f-body);font-size:14px;
  color:#fff;outline:none;resize:none;
  max-height:90px;line-height:1.5;
  transition:border-color 0.2s, box-shadow 0.2s;

let AC, sndOn = true;
function initAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}
function tone(freq,dur,type='sine',vol=0.12,delay=0){
  if(!sndOn||!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.setValueAtTime(freq,AC.currentTime+delay);
  g.gain.setValueAtTime(0,AC.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol,AC.currentTime+delay+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+delay+dur);
  o.start(AC.currentTime+delay);o.stop(AC.currentTime+delay+dur+0.05);
}

  boot:()=>{initAC();tone(200,0.07,'square',0.07);tone(400,0.07,'square',0.07,0.05);},

  login:()=>{initAC();[440,554,659,880].forEach((f,i)=>tone(f,0.18,'sine',0.13,i*0.09));},
  key:()=>{initAC();tone(700+Math.random()*300,0.04,'sine',0.06);},
  ping:()=>{initAC();tone(880,0.07,'sine',0.09);tone(1100,0.06,'sine',0.07,0.07);},
  notif:()=>{initAC();tone(660,0.06,'sine',0.08);tone(880,0.08,'sine',0.07,0.09);},
  exit:()=>{initAC();[440,330,220,165].forEach((f,i)=>tone(f,0.14,'sine',0.11,i*0.11));},
  ambient:()=>{
    initAC();
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type='sine';o.frequency.setValueAtTime(110,AC.currentTime);
    g.gain.setValueAtTime(0.04,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+4);
    o.start();o.stop(AC.currentTime+4);
  }
};

  for(let i=0;i<4;i++)document.getElementById('pd'+i).className='pd'+(i<pinStr.length?' on':'');
}
function pinConfirm(){
  snd.login();
  document.getElementById('pinOv').classList.remove('show');
  setStepDone(4);
  bootIdx++;
  setStepAct(bootIdx);
  updateProg();
  document.getElementById('bootBtn').disabled=false;

/* =====================================================
   COLOR PICKER
===================================================== */
function buildClrGrid(){
  const g=document.getElementById('clrGrid');
  Object.values(CLRS).forEach(c=>{
    const d=document.createElement('div');
    d.className='clr-pick'+(c.id===userClr.id?' sel':'');
    d.style.background=c.hex;
    d.dataset.id=c.id;
    d.onclick=()=>pickClr(c.id);
    g.appendChild(d);
  });
}
function pickClr(id){
  userClr=CLRS[id];
  document.querySelectorAll('.clr-pick').forEach(e=>e.classList.remove('sel'));
  document.querySelector(`.clr-pick[data-id="${id}"]`).classList.add('sel');
  applyUserClr();
  snd.key();
}
function applyUserClr(){
  document.documentElement.style.setProperty('--user-clr',userClr.hex);
  const ib=document.getElementById('idBtn');if(ib){ib.style.background=userClr.hex;ib.style.color='#000';}
  const bb=document.getElementById('bootBtn');if(bb){bb.style.background=userClr.hex;bb.style.color='#000';}
  const sb=document.getElementById('sendBtn');
  if(sb){sb.style.background=userClr.hex;sb.style.color=userClr.id==='w'||userClr.id==='y'?'#000':'#fff';}
  const mi=document.getElementById('msgInput');
  if(mi){mi.style.borderColor=userClr.hex+'55';}
  colorKeyboard();
}
function colorKeyboard(){
  const hex=userClr.hex;
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  document.documentElement.style.setProperty('--key-bg',`rgba(${r},${g},${b},0.1)`);
  document.documentElement.style.setProperty('--key-border',`rgba(${r},${g},${b},0.3)`);
  document.documentElement.style.setProperty('--key-clr',hex);
  document.documentElement.style.setProperty('--key-press',`rgba(${r},${g},${b},0.38)`);
  // Enter key stronger
  const ek=document.querySelector('.enter-k');
  if(ek){ek.style.background=`rgba(${r},${g},${b},0.22)`;ek.style.borderColor=`rgba(${r},${g},${b},0.55)`;}
  // Send btn glow
  const sb=document.getElementById('sendBtn');
  if(sb){sb.style.boxShadow=`0 0 16px rgba(${r},${g},${b},0.45)`;}
}

/* =====================================================
   ENTER COMMAND CENTER
===================================================== */
function enterMain(){
  initAC();
  const n=document.getElementById('nameIn').value.trim().toUpperCase();
  if(!n){document.getElementById('nameIn').focus();return;}
  userName=n;
  snd.login();
  buildMain();
  gotoScreen('s-main');
  setBadge('active');
  sessionStart=Date.now();
  setTimeout(()=>startBots(),3500);
  setTimeout(()=>startNotifs(),9000);
  snd.ambient();
}

/* =====================================================
   BUILD MAIN COMMAND CENTER
===================================================== */
function buildMain(){
  // CMD header
  const d=document.getElementById('cmdDot');
  d.style.background=userClr.hex;
  d.style.boxShadow='0 0 8px '+userClr.hex;
  document.getElementById('cmdName').textContent=userName;
  document.getElementById('cmdName').style.color=userClr.hex;
  applyUserClr(); // re-run to ensure keyboard + send btn are fully colored

  // Bot bar
  const bb=document.getElementById('botBar');
  bb.innerHTML=BOTS.map(b=>`
    <div class="btag" style="background:rgba(${h2r(b.hex)},0.07);border-color:rgba(${h2r(b.hex)},0.3);color:${b.hex}">
      <div class="bdot" style="background:${b.hex}"></div>${b.name}
    </div>`).join('');
  // Welcome
  addSys('◈ IPNOTEC PINGG COMMAND CENTER — SESSION ACTIVE ◈');
  addBot('nexus','Session authenticated. Welcome, '+userName+'. Communications secured. All transmissions end-to-end encrypted.');
}

function h2r(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

/* =====================================================
   MESSAGES
===================================================== */
function addSys(txt){
  const c=document.getElementById('chat');
  const d=document.createElement('div');d.className='sys-msg';d.textContent=txt;
  c.appendChild(d);scroll();
}

function addUser(txt){
  const c=document.getElementById('chat');
  const d=document.createElement('div');d.className='msg u';
  const dname=anonMode?'':userName;
  const dnameColor=anonMode?'transparent':(ipmMode?'#ffffff':userClr.hex);
  const bubbleBg=ipmMode?'rgba(8,8,22,0.85)':userClr.hex;
  const txtColor=ipmMode?userClr.hex:'#ffffff';
  const mode=ipmMode?'mode-ipm':'mode-normal';
  const borderL=ipmMode?`border-left:2px solid ${userClr.hex};`:'';
  d.innerHTML=`
    <div class="msg-hdr">
      <span class="m-time">${now()}</span>
      ${dname?`<span class="m-name" style="color:${dnameColor}">${dname}</span>`:''}
      <div class="m-dot" style="background:${userClr.hex}"></div>
    </div>
    <div class="bubble ${mode}" style="background:${bubbleBg};color:${txtColor};${borderL}">${esc(txt)}</div>`;
  c.appendChild(d);scroll();
  msgCount++;snd.ping();flashEdge(userClr.hex);
  // bot response
  setTimeout(()=>botReply(txt),900+Math.random()*1600);
}

function addBot(botId,txt){
  const bot=botById(botId);
  const c=document.getElementById('chat');
  // Thinking indicator
  const tid='th'+Date.now()+Math.random();
  const th=document.createElement('div');th.className='msg b';th.id=tid;
  th.innerHTML=`
    <div class="msg-hdr">
      <div class="m-dot" style="background:${bot.hex}"></div>
      <span class="m-name" style="color:${bot.hex}">${bot.name}</span>
    </div>
    <div class="thinking">
      <div class="td" style="background:${bot.hex}"></div>
      <div class="td" style="background:${bot.hex}"></div>
      <div class="td" style="background:${bot.hex}"></div>
    </div>`;
  c.appendChild(th);scroll();
  const delay=500+Math.random()*900;
  setTimeout(()=>{
    const el=document.getElementById(tid);if(el)el.remove();
    // Now render full message
    const nameColor=ipmMode?'#ffffff':bot.hex;
    const bubbleBg=ipmMode?'rgba(8,8,22,0.85)':'rgba(255,255,255,0.04)';
    const txtColor=ipmMode?bot.hex:'rgba(255,255,255,0.88)';
    const mode=ipmMode?'mode-ipm':'mode-normal';
    const borderStyle=ipmMode?`border-left:2px solid ${bot.hex};`:`border-left:2px solid ${bot.hex}40;`;
    const m=document.createElement('div');m.className='msg b';
    m.innerHTML=`
      <div class="msg-hdr">
        <div class="m-dot" style="background:${bot.hex}"></div>
        <span class="m-name" style="color:${nameColor}">${bot.name}</span>
        <span class="m-role">${bot.title}</span>
        <span class="m-time">${now()}</span>
      </div>
      <div class="bubble ${mode}" style="background:${bubbleBg};color:${txtColor};${borderStyle}">${esc(txt)}</div>`;
    c.appendChild(m);scroll();
    msgCount++;snd.ping();flashEdge(bot.hex);lightKey(bot.name.charAt(0),bot.hex);
  },delay);
}

function botReply(userTxt){
  const lo=userTxt.toLowerCase();
  let replyBot=BOTS[Math.floor(Math.random()*BOTS.length)];
  let replyTxt=null;
  for(const bot of BOTS){
    for(const [kw,resp] of Object.entries(bot.resp)){
      if(lo.includes(kw)){replyBot=bot;replyTxt=resp;break;}
    }
    if(replyTxt)break;
  }
  if(!replyTxt)replyTxt=replyBot.msgs[Math.floor(Math.random()*replyBot.msgs.length)];
  addBot(replyBot.id,replyTxt);
}

/* =====================================================
   AUTO BOT ACTIVITY
===================================================== */
function startBots(){
  addBot('aria','Monitoring session. Calibrating to restricted-input environment. Cognitive signal: STRONG.');
  schedBot();
}
function schedBot(){
  botTimer=setTimeout(()=>{
    const bot=BOTS[Math.floor(Math.random()*BOTS.length)];
    addBot(bot.id,bot.msgs[Math.floor(Math.random()*bot.msgs.length)]);
    schedBot();
  },9000+Math.random()*13000);
}

/* =====================================================
   SEND — native textarea
===================================================== */
function sendMsg(){
  const inp=document.getElementById('msgInput');
  const txt=inp.value.trim();
  if(!txt)return;
  inp.value='';
  inp.style.height='auto';
  addUser(txt);
}
function handleEnter(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
}
function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,90)+'px';
}
function transmit(){
  const bot=BOTS[Math.floor(Math.random()*BOTS.length)];
  addBot(bot.id,bot.msgs[Math.floor(Math.random()*bot.msgs.length)]);
}
function clearChat(){
  document.getElementById('chat').innerHTML='';
  addSys('LOG CLEARED · READY FOR NEW TRANSMISSIONS');
  snd.boot();
}

/* =====================================================
   ANON MODE
===================================================== */
function toggleAnon(){
  anonMode=!anonMode;
  const tog=document.getElementById('anonTog');
  const cn=document.getElementById('cmdName');
  const al=document.getElementById('anonLbl');
  const ab2=document.getElementById('anonBtn2');
  tog.className='tog'+(anonMode?' on':'');
  if(anonMode){
    cn.classList.add('gone');
    al.classList.add('show');
    ab2.classList.add('anon-on');
    addSys('◈ ANONYMOUS MODE ENABLED — IDENTITY MASKED');
  } else {
    cn.classList.remove('gone');
    al.classList.remove('show');
    ab2.classList.remove('anon-on');
    addSys('◈ ANONYMOUS MODE DISABLED — IDENTITY RESTORED');
  }
  snd.key();
}

/* =====================================================
   IPNOTEC MODE (IPM)
   New msgs: username=white, text=profile color, bubble=dark glass
   Toggle swaps back
===================================================== */
function toggleIPM(){
  ipmMode=!ipmMode;
  const btn=document.getElementById('ipmBtn');
  if(ipmMode){
    btn.classList.add('ipm-on');
    btn.textContent='◐ IMODE ON';
    addSys('◐ IPNOTEC MODE ACTIVE — USERNAME: WHITE · TEXT: PROFILE COLOR');
  } else {
    btn.classList.remove('ipm-on');
    btn.textContent='◐ IMODE';
    addSys('◐ IPNOTEC MODE OFF — STANDARD DISPLAY RESTORED');
  }
  snd.key();
}

/* =====================================================
   KEY GLOW — first letter of sender
===================================================== */
let litKey=null, litTimer=null;
function lightKey(letter,hex){
  if(litKey){
    litKey.classList.remove('lit');
    litKey.style.color='';litKey.style.borderColor='';litKey.style.boxShadow='';
  }
  clearTimeout(litTimer);
  const el=document.getElementById('k-'+letter.toLowerCase());
  if(!el)return;
  litKey=el;
  el.classList.add('lit');
  el.style.color=hex;
  el.style.borderColor=hex;
  el.style.boxShadow=`0 0 16px ${hex}, inset 0 0 8px ${hex}22, 0 2px 4px rgba(0,0,0,0.3)`;
  litTimer=setTimeout(()=>{
    el.classList.remove('lit');
    el.style.color='';el.style.borderColor='';el.style.boxShadow='';
    litKey=null;
  },2200);
}

/* =====================================================
   EDGE INDICATOR
===================================================== */
let edgeTm;
function flashEdge(hex){
  const e=document.getElementById('edgeInd');
  e.style.backgroundColor=hex;e.style.boxShadow=`0 0 16px ${hex}`;e.style.opacity='1';
  clearTimeout(edgeTm);
  edgeTm=setTimeout(()=>e.style.opacity='0',1800);
}

/* =====================================================
   EXIT SEQUENCE
===================================================== */
const EXIT_STEPS=[
  'Flushing session tokens...',
  'Releasing MDM policy lock...',
  'Restoring OS notifications...',
  'Closing network tunnel...',
  'Uploading session audit log...',
  'Biometric session signature applied...',
  'Device returned to standard mode.',
];
function exitConfirm(){
  initAC();
  const ok=confirm('EXIT IPNOTEC PINGG?\n\nAll security policies will be released.\nSession audit will be logged.\n\nOK to exit securely.');
  if(ok)runExit();
}
function runExit(){
  clearTimeout(botTimer);
  snd.exit();
  gotoScreen('s-exit');
  setBadge('exit');
  const es=document.getElementById('exitSteps');
  es.innerHTML=EXIT_STEPS.map((s,i)=>`<div class="esr" id="esr${i}"><span class="esr-ic">○</span>${s}</div>`).join('');
  document.getElementById('exitStatus').style.color='var(--clr-r)';
  document.getElementById('exitStatus').textContent='RELEASING POLICIES...';
  let i=0;
  function step(){
    if(i>=EXIT_STEPS.length){exitDone();return;}
    const e=document.getElementById('esr'+i);
    e.classList.add('done');e.querySelector('.esr-ic').textContent='✓';
    snd.boot();i++;setTimeout(step,460);
  }
  setTimeout(step,500);
}
function exitDone(){
  const dur=Math.floor((Date.now()-sessionStart)/1000);
  const m=Math.floor(dur/60),s=dur%60;
  document.getElementById('exitStatus').textContent='SESSION ENDED SECURELY ✓';
  document.getElementById('exitStatus').style.color='var(--clr-g)';
  const sum=document.getElementById('exitSum');
  sum.innerHTML=`
    <div class="esr2"><span class="esl">CALLSIGN</span><span class="esv">${userName}</span></div>
    <div class="esr2"><span class="esl">COLOR NODE</span><span class="esv" style="color:${userClr.hex}">${userClr.name}</span></div>
    <div class="esr2"><span class="esl">SESSION TIME</span><span class="esv">${m}m ${s}s</span></div>
    <div class="esr2"><span class="esl">MESSAGES</span><span class="esv">${msgCount}</span></div>
    <div class="esr2"><span class="esl">ANON MODE</span><span class="esv">${anonMode?'ACTIVE':'INACTIVE'}</span></div>
    <div class="esr2"><span class="esl">IPNOTEC MODE</span><span class="esv">${ipmMode?'ACTIVE':'INACTIVE'}</span></div>
    <div class="esr2"><span class="esl">STATUS</span><span class="esv" style="color:var(--clr-g)">CLEAN EXIT ✓</span></div>`;
  sum.classList.add('show');
  const rb=document.getElementById('restartBtn');rb.style.display='block';
  snd.confirm();
}

/* =====================================================
   SCREEN + BADGE NAV
===================================================== */
function gotoScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function setBadge(mode){
  const b=document.getElementById('sbBadge');
  b.className='sb-mode-badge '+mode;
  b.textContent={boot:'BOOT',identity:'SETUP',active:'ACTIVE',exit:'EXIT'}[mode]||mode.toUpperCase();
}

/* =====================================================
   UTILS
===================================================== */
function now(){const n=new Date();return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function scroll(){const c=document.getElementById('chat');if(c)c.scrollTop=c.scrollHeight;}

/* =====================================================
   INIT
===================================================== */
buildBoot();
buildClrGrid();
applyUserClr();

// Name input — enter key submits
document.getElementById('nameIn').addEventListener('keydown',function(e){
  if(e.key==='Enter'){enterMain();}
});
